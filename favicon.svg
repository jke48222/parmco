<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0E0E0C"/>
  <!-- Motor arc -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#FF5B1F" stroke-width="1.5" stroke-dasharray="22 11" stroke-linecap="round" transform="rotate(-90 16 16)"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3.5" fill="#FF5B1F"/>
  <!-- Tick mark at top (12 o'clock) -->
  <line x1="16" y1="4.5" x2="16" y2="7.5" stroke="#FF5B1F" stroke-width="2" stroke-linecap="round"/>
</svg>
